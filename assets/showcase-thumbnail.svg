  <text x="145" y="485" fill="#ffffff" font-size="30" font-family="Segoe UI, Arial, sans-serif">2. Agriculture</text>
  <text x="145" y="525" fill="#ffffff" font-size="30" font-family="Segoe UI, Arial, sans-serif">3. Business</text>

  <circle cx="875" cy="432" r="88" fill="#f7b267" />
  <polygon points="850,388 850,476 922,432" fill="#102a43" />
  <text x="785" y="565" fill="#f0f4f8" font-size="28" font-family="Segoe UI, Arial, sans-serif">Watch Demo</text>
