<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Tech Career Recommendation Tree Showcase Thumbnail</title>
  <desc id="desc">A thumbnail image linking to the project showcase video.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#102a43" />
      <stop offset="100%" stop-color="#1f7a8c" />
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f0f4f8" stop-opacity="0.14" />
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.08" />
    </linearGradient>
  </defs>

  <rect width="1200" height="675" fill="url(#bg)" rx="28" />
  <circle cx="1040" cy="120" r="140" fill="#ffffff" opacity="0.08" />
  <circle cx="1110" cy="560" r="180" fill="#ffffff" opacity="0.06" />

  <rect x="70" y="70" width="1060" height="535" rx="26" fill="url(#panel)" stroke="#d9e2ec" stroke-opacity="0.25" />

  <text x="110" y="155" fill="#e6f1f5" font-size="30" font-family="Consolas, 'Courier New', monospace">BOTSWANA TECH CAREER GUIDE</text>
  <text x="110" y="230" fill="#ffffff" font-size="64" font-weight="700" font-family="Segoe UI, Arial, sans-serif">Tech Career Recommendation Tree</text>
  <text x="110" y="292" fill="#d9e2ec" font-size="28" font-family="Segoe UI, Arial, sans-serif">Tree structure + BFS search + autocomplete job selection</text>

  <rect x="110" y="350" width="430" height="165" rx="20" fill="#0b1f33" fill-opacity="0.55" stroke="#7fc8d6" stroke-opacity="0.4" />
  <text x="145" y="400" fill="#9fb3c8" font-size="22" font-family="Consolas, 'Courier New', monospace">Categories</text>
